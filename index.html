<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Aid Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">Reader</div>

      <div class="sidebar-controls">

        <!-- Typography -->
        <div class="control-group">
          <label class="control-label">Font</label>
          <select id="font-family" class="font-select">
            <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" selected>System Default</option>
            <option value="Georgia">Georgia</option>
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Helvetica">Helvetica</option>
          </select>
        </div>

        <div class="control-group">
          <label class="control-label">Size</label>
          <div class="stepper">
            <button id="font-size-dec" class="stepper-btn">−</button>
            <span id="font-size-value" class="stepper-value">18px</span>
            <button id="font-size-inc" class="stepper-btn">+</button>
          </div>
          <input type="range" id="font-size-slider" min="14" max="28" step="1" value="18" class="slider">
        </div>

        <div class="control-group">
          <label class="control-label">Line Height</label>
          <div class="stepper">
            <button id="line-height-dec" class="stepper-btn">−</button>
            <span id="line-height-value" class="stepper-value">1.8</span>
            <button id="line-height-inc" class="stepper-btn">+</button>
          </div>
          <input type="range" id="line-height-slider" min="1.4" max="2.4" step="0.1" value="1.8" class="slider">
        </div>

        <div class="control-group">
          <label class="control-label">Text Color</label>
          <div class="color-control">
            <input type="color" id="font-color" value="#2c2c2c">
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Background</label>
          <div class="color-control">
            <input type="color" id="bg-color" value="#ffffff">
          </div>
        </div>

      </div>

      <!-- Reading Aids -->
      <div class="sidebar-section-label">Reading Aids</div>

      <div class="aid-toggle-group">

        <div class="aid-toggle-row">
          <label class="aid-toggle-switch">
            <input type="checkbox" id="toggle-bold">
            <span class="track"></span>
          </label>
          <span class="aid-toggle-label">Bold Beginnings</span>
        </div>

        <div class="aid-toggle-row">
          <label class="aid-toggle-switch">
            <input type="checkbox" id="toggle-emotion">
            <span class="track"></span>
          </label>
          <span class="aid-toggle-label">Emotion Colors</span>
        </div>

        <div class="emotion-colors" id="emotion-colors">
          <div class="emotion-color-row">
            <span>Positive</span>
            <input type="color" id="emotion-positive-color" value="#27ae60">
          </div>
          <div class="emotion-color-row">
            <span>Negative</span>
            <input type="color" id="emotion-negative-color" value="#e74c3c">
          </div>
          <div class="emotion-color-row">
            <span>Surprise</span>
            <input type="color" id="emotion-surprise-color" value="#8e44ad">
          </div>
        </div>

        <div class="aid-toggle-row">
          <label class="aid-toggle-switch">
            <input type="checkbox" id="toggle-gradient">
            <span class="track"></span>
          </label>
          <span class="aid-toggle-label">Row Shading</span>
        </div>

        <div class="aid-toggle-row">
          <label class="aid-toggle-switch">
            <input type="checkbox" id="toggle-logic">
            <span class="track"></span>
          </label>
          <span class="aid-toggle-label">Logic Words</span>
        </div>

      </div>

    </nav>

    <!-- Main Content -->
    <main class="content-area">
      <article id="article"></article>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
